# docker-compose.override.yml
# Lokale Entwicklung mit Xdebug
# WIRD AUTOMATISCH VON make debug-on ERSTELLT
# .gitignored - nicht in VCS einchecken

services:
  php:
    build:
      args:
        INSTALL_XDEBUG: 'true'
    environment:
      # Xdebug 3.x Runtime-Konfiguration
      XDEBUG_MODE: debug,develop
      XDEBUG_CONFIG: "client_host=host.docker.internal client_port=9003 idekey=resumehaven"

